name: Build Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
            archive: tar.gz
          - target: linux-arm64
            goos: linux
            goarch: arm64
            archive: tar.gz
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
            archive: tar.gz
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            archive: tar.gz
          - target: windows-amd64
            goos: windows
            goarch: amd64
            archive: zip

    env:
      BINARY_NAME: simplenote

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build packaged release
        id: package
        shell: bash
        env:
          TARGET_OS: ${{ matrix.goos }}
          TARGET_ARCH: ${{ matrix.goarch }}
          ARCHIVE_FORMAT: ${{ matrix.archive }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          binary_name="${BINARY_NAME}"
          if [ "${TARGET_OS}" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi

          package_dir="${BINARY_NAME}_${VERSION}_${TARGET_OS}_${TARGET_ARCH}"
          mkdir -p "dist/${package_dir}"

          CGO_ENABLED=0 GOOS="${TARGET_OS}" GOARCH="${TARGET_ARCH}" \
            go build -trimpath -ldflags="-s -w" -o "dist/${package_dir}/${binary_name}" .

          cp -R public "dist/${package_dir}/public"
          cp -R views "dist/${package_dir}/views"
          cp README.md LICENSE "dist/${package_dir}/"

          if [ "${ARCHIVE_FORMAT}" = "zip" ]; then
            archive_path="dist/${package_dir}.zip"
            (
              cd dist
              zip -r "${package_dir}.zip" "${package_dir}"
            )
          else
            archive_path="dist/${package_dir}.tar.gz"
            tar -C dist -czf "${archive_path}" "${package_dir}"
          fi

          echo "archive_path=${archive_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.package.outputs.archive_path }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums and notes
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt
          cd ..

          cat > RELEASE_NOTES.md <<EOF
          自动构建的 ${VERSION} Release。

          包含平台：
          - Linux amd64 / arm64
          - macOS amd64 / arm64
          - Windows amd64

          下载后请与同目录下的 public/ 和 views/ 一起运行可执行文件。
          校验值见附件 SHA256SUMS.txt。
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SimpleNote ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
